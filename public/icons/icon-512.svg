  <line x1="420" y1="204" x2="420" y2="345" stroke="#fbbf24" stroke-width="10" stroke-linecap="round"/>
  <!-- Tassel end knot -->
  <circle cx="420" cy="358" r="26" fill="#fbbf24" opacity="0.9"/>
  <!-- Tassel fringe -->
  <line x1="404" y1="380" x2="397" y2="415" stroke="#fbbf24" stroke-width="7" stroke-linecap="round"/>
  <line x1="420" y1="384" x2="420" y2="420" stroke="#fbbf24" stroke-width="7" stroke-linecap="round"/>
  <line x1="436" y1="380" x2="443" y2="415" stroke="#fbbf24" stroke-width="7" stroke-linecap="round"/>
</svg>
